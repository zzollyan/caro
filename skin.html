<style>
body{font-family:'Inter',sans-serif;min-height:max(884px,100dvh)}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
html.light{background:#f5f5f0;color:#151310}
.skin-card{transition:transform .2s ease,box-shadow .2s ease}
.skin-card:hover{transform:translateY(-3px)}
.skin-card.selected{border-color:#81B64C;background:rgba(129,182,76,.12)}
.piece-preview{font-size:34px;line-height:1}

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<header class="bg-surface-container shadow-sm w-full top-0 sticky z-50">
<div class="flex justify-between items-center px-md py-sm max-w-container-max mx-auto h-16">
<div class="flex items-center gap-4">
<a href="game.html" class="transition-all duration-200 active:scale-95 text-on-surface-variant hover:text-primary"><span class="material-symbols-outlined text-3xl">arrow_back</span></a>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-action-green tracking-tighter">HÌNH QUÂN CỜ</h1>
</div>
<span class="text-on-surface-variant font-label-caps text-label-caps">SKINS</span>
</div>
</header>
<main class="flex-grow max-w-4xl mx-auto w-full px-md py-lg">
<div class="bg-surface-container-low rounded-xl shadow-xl overflow-hidden border border-outline-variant/20">
<div class="px-md py-lg bg-surface-bright/10 border-b border-outline-variant/30">
<h2 class="font-headline-lg text-headline-lg mb-2">Tùy Chỉnh Quân Cờ</h2>
<p class="text-on-surface-variant font-body-sm text-body-sm">Chọn bộ hình quân cờ yêu thích thay vì chỉ X/O cơ bản.</p>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-md p-md" id="skin-grid">
<button data-style="classic" class="skin-card flex items-center justify-between p-md rounded-xl border-2 border-outline-variant bg-surface-container">
<div class="flex flex-col items-start gap-1">
<span class="font-label-caps text-label-caps text-on-surface-variant">Classic</span>
<span class="font-title-md text-title-md">Cổ Điển</span>
</div>
<div class="flex items-center gap-2">
<span class="piece-preview material-symbols-outlined" style="font-variation-settings:'FILL' 1;color:#81B64C">close</span>
<span class="piece-preview material-symbols-outlined" style="font-variation-settings:'FILL' 1;color:#E74C3C">radio_button_unchecked</span>
</div>
</button>
<button data-style="stones" class="skin-card flex items-center justify-between p-md rounded-xl border-2 border-outline-variant bg-surface-container">
<div class="flex flex-col items-start gap-1">
<span class="font-label-caps text-label-caps text-on-surface-variant">Stones</span>
<span class="font-title-md text-title-md">Quân Cờ Vây</span>
</div>
<div class="flex items-center gap-2">
<span class="piece-preview material-symbols-outlined" style="font-variation-settings:'FILL' 1;color:#1a1a1a;text-shadow:0 1px 2px rgba(0,0,0,.5)">circle</span>
<span class="piece-preview material-symbols-outlined" style="font-variation-settings:'FILL' 0;color:#f5f5f0;-webkit-text-stroke:2px #888">circle</span>
</div>
</button>
<button data-style="animals" class="skin-card flex items-center justify-between p-md rounded-xl border-2 border-outline-variant bg-surface-container">
<div class="flex flex-col items-start gap-1">
<span class="font-label-caps text-label-caps text-on-surface-variant">Animals</span>
<span class="font-title-md text-title-md">Thú Cưng</span>
</div>
<div class="flex items-center gap-2">
<span class="piece-preview">🐯</span>
<span class="piece-preview">🐼</span>
</div>
</button>
<button data-style="gems" class="skin-card flex items-center justify-between p-md rounded-xl border-2 border-outline-variant bg-surface-container">
<div class="flex flex-col items-start gap-1">
<span class="font-label-caps text-label-caps text-on-surface-variant">Gems</span>
<span class="font-title-md text-title-md">Đá Quý</span>
</div>
<div class="flex items-center gap-2">
<span class="piece-preview">💎</span>
<span class="piece-preview">🔷</span>
</div>
</button>
</div>
<div class="p-md bg-surface-container-highest/20 flex justify-between items-center gap-md">
<div class="bg-surface-ebony rounded-lg p-md flex items-center gap-md border border-outline-variant/30">
<span class="font-label-caps text-label-caps text-on-surface-variant">Xem trước:</span>
<span class="piece-preview" id="preview-x"></span>
<span class="piece-preview" id="preview-o"></span>
</div>
<a href="game.html" class="px-lg py-sm rounded-lg font-title-md text-title-md bg-action-green text-white shadow-lg border-b-4 border-[#2d5e2d] hover:brightness-110 active:border-b-0 active:translate-y-[4px] transition-all">Vào Chơi</a>
</div>
</div>
</main>
<div class="h-20"></div>
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 pb-safe bg-surface-container-highest border-t border-outline-variant shadow-md rounded-t-xl">
<a href="index.html" class="flex flex-col items-center justify-center text-on-surface-variant active:scale-90 transition-transform duration-150"><span class="material-symbols-outlined">home</span><span class="font-label-caps text-label-caps">Home</span></a>
<a href="game.html" class="flex flex-col items-center justify-center text-on-surface-variant active:scale-90 transition-transform duration-150"><span class="material-symbols-outlined">sports_esports</span><span class="font-label-caps text-label-caps">Play</span></a>
<a href="settings.html" class="flex flex-col items-center justify-center text-on-surface-variant active:scale-90 transition-transform duration-150"><span class="material-symbols-outlined">settings</span><span class="font-label-caps text-label-caps">Settings</span></a>
<a href="help.html" class="flex flex-col items-center justify-center text-on-surface-variant active:scale-90 transition-transform duration-150"><span class="material-symbols-outlined">help</span><span class="font-label-caps text-label-caps">Help</span></a>
</nav>
<script>
const DEFAULT_SETTINGS={theme:'dark',sound:true,music:false,boardSize:15,pieceStyle:'classic',aiDifficulty:'easy'};
function loadSettings(){
  try{return Object.assign({},DEFAULT_SETTINGS,JSON.parse(localStorage.getItem('gomoku_settings'))||{});}
  catch(e){return Object.assign({},DEFAULT_SETTINGS);}
}
function saveSettings(s){localStorage.setItem('gomoku_settings',JSON.stringify(s));}
function applyTheme(theme){
  const html=document.documentElement;
  if(theme==='light'){html.classList.remove('dark');html.classList.add('light');}
  else{html.classList.add('dark');html.classList.remove('light');}
}
let settings=loadSettings();
applyTheme(settings.theme);

const PREVIEWS={
  classic:{x:'<span class="material-symbols-outlined piece-preview" style="font-variation-settings:\'FILL\' 1;color:#81B64C">close</span>',o:'<span class="material-symbols-outlined piece-preview" style="font-variation-settings:\'FILL\' 1;color:#E74C3C">radio_button_unchecked</span>'},
  stones:{x:'<span class="material-symbols-outlined piece-preview" style="font-variation-settings:\'FILL\' 1;color:#1a1a1a;text-shadow:0 1px 2px rgba(0,0,0,.5)">circle</span>',o:'<span class="material-symbols-outlined piece-preview" style="font-variation-settings:\'FILL\' 0;color:#f5f5f0;-webkit-text-stroke:2px #888">circle</span>'},
  animals:{x:'🐯',o:'🐼'},
  gems:{x:'💎',o:'🔷'}
};

function updateUI(){
  document.querySelectorAll('.skin-card').forEach(card=>{
    if(card.dataset.style===settings.pieceStyle) card.classList.add('selected');
    else card.classList.remove('selected');
  });
  document.getElementById('preview-x').innerHTML=PREVIEWS[settings.pieceStyle].x;
  document.getElementById('preview-o').innerHTML=PREVIEWS[settings.pieceStyle].o;
}
updateUI();

document.querySelectorAll('.skin-card').forEach(card=>{
  card.addEventListener('click',()=>{
    settings.pieceStyle=card.dataset.style;
    saveSettings(settings);
    updateUI();
  });
});
</script>
</body>
</html>
