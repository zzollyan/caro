<style>

</div>
<div class="flex flex-col sm:flex-row gap-md w-full justify-center">
<a href="game.html?mode=pvp" class="bg-action-green text-text-white font-title-md text-title-md py-md px-xl rounded-xl border-b-4 border-black/20 glow-hover transition-all duration-200 active:scale-95 active:border-b-0 active:translate-y-1 flex items-center justify-center gap-xs">

<footer class="md:hidden fixed bottom-0 left-0 w-full z-50 bg-surface-container-highest border-t border-outline-variant shadow-md flex justify-around items-center px-4 py-2 pb-safe">

<span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">home</span><span class="font-label-caps text-label-caps">Home</span></a>
<a href="game.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-all active:scale-90 duration-150">

<span class="material-symbols-outlined">help</span><span class="font-label-caps text-label-caps">Help</span></a>
</footer>
<script>
function loadSettings(){
  try{return JSON.parse(localStorage.getItem('gomoku_settings'))||{theme:'dark',sound:true,music:false,boardSize:15};}
  catch(e){return {theme:'dark',sound:true,music:false,boardSize:15};}
}
function saveSettings(s){localStorage.setItem('gomoku_settings',JSON.stringify(s));}
function applyTheme(theme){
  const html=document.documentElement;
  if(theme==='light'){html.classList.remove('dark');html.classList.add('light');}
  else{html.classList.add('dark');html.classList.remove('light');}
  const icon=document.getElementById('theme-icon');
  if(icon) icon.textContent = theme==='light' ? 'light_mode' : 'dark_mode';
}
let settings=loadSettings();
applyTheme(settings.theme);
document.getElementById('theme-toggle').addEventListener('click',()=>{
  settings.theme = settings.theme==='light' ? 'dark' : 'light';
  saveSettings(settings);
  applyTheme(settings.theme);
});
const container=document.getElementById('particle-container');
for(let i=0;i<15;i++){
  const p=document.createElement('div');
  p.className='particle';
  const size=Math.random()*4+2;
  p.style.width=size+'px';p.style.height=size+'px';
  p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';
  p.style.opacity=Math.random()*0.5;
  container.appendChild(p);
  const duration=10000+Math.random()*20000;
  const xMove=(Math.random()-0.5)*100;
  const yMove=(Math.random()-0.5)*100;
  p.animate([{transform:'translate(0,0)',opacity:p.style.opacity},{transform:`translate(${xMove}px,${yMove}px)`,opacity:0}],{duration,iterations:Infinity,easing:'ease-in-out'});
}
</script>
