tailwind.config = {

    extend: {

        "secondary-container": "#3b6a00",

        "on-primary": "#04390c",

<style>
html,body{height:100%}
body{font-family:'Inter',sans-serif}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
.board-grid{display:grid;background-color:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
.board-cell{position:relative;border:.5px solid rgba(255,255,255,.1);transition:background-color .15s ease;cursor:pointer;display:flex;align-items:center;justify-content:center}
.board-cell:hover{background-color:rgba(129,182,76,.15)}
.board-cell.disabled{cursor:not-allowed}
.piece{animation:piece-drop .18s cubic-bezier(.175,.885,.32,1.275) forwards;user-select:none;line-height:1;display:flex;align-items:center;justify-content:center;width:100%;height:100%}
@keyframes piece-drop{0%{transform:scale(1.6);opacity:0}100%{transform:scale(1);opacity:1}}
.last-move-indicator{position:absolute;inset:8%;border:2px solid #9ed497;border-radius:4px;animation:pulse-border 2s infinite;pointer-events:none;z-index:2}
@keyframes pulse-border{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
.win-cell{background-color:rgba(129,182,76,.35) !important}
.win-cell .piece{animation:win-bounce .6s ease-in-out infinite alternate}
@keyframes win-bounce{0%{transform:scale(1)}100%{transform:scale(1.15)}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#1e1b18}
::-webkit-scrollbar-thumb{background:#373431;border-radius:3px}
html.light .board-dark{background-color:#EEEEEE !important}
html.light{background:#f5f5f0;color:#151310}
#game-board-container{flex-shrink:0}
.confetti{position:absolute;top:-10px;width:8px;height:14px;opacity:0.9;animation:confetti-fall linear forwards}
@keyframes confetti-fall{to{transform:translateY(420px) rotate(540deg);opacity:0}}
.diff-select{background-color:#262421;color:#e8e1dc;border:1px solid #41493f}
</style>
</head>

<p class="text-on-surface-variant mb-lg relative z-10" id="modal-desc">Người chơi X đã thắng với 5 quân liên tiếp.</p>

<script>
const DEFAULT_SETTINGS={theme:'dark',sound:true,music:false,boardSize:15,pieceStyle:'classic',aiDifficulty:'easy'};
function loadSettings(){
  try{return Object.assign({},DEFAULT_SETTINGS,JSON.parse(localStorage.getItem('gomoku_settings'))||{});}
  catch(e){return Object.assign({},DEFAULT_SETTINGS);}
}
function saveSettings(s){localStorage.setItem('gomoku_settings',JSON.stringify(s));}
function applyTheme(theme){
  const html=document.documentElement;
  if(theme==='light'){html.classList.remove('dark');html.classList.add('light');}
  else{html.classList.add('dark');html.classList.remove('light');}
}
let settings=loadSettings();
applyTheme(settings.theme);

const params=new URLSearchParams(window.location.search);
const mode=params.get('mode')||'pvp';
if(mode==='ai'){
  document.getElementById('name-o').textContent='AI';
  const diffSelect=document.getElementById('ai-difficulty');
  diffSelect.classList.remove('hidden');
  diffSelect.value=settings.aiDifficulty;
  diffSelect.addEventListener('change',()=>{
    settings.aiDifficulty=diffSelect.value;
    saveSettings(settings);
  });
}

const PIECE_STYLES={
  classic:{x:'<span class="material-symbols-outlined" style="font-variation-settings:\'FILL\' 1;color:#81B64C">close</span>',o:'<span class="material-symbols-outlined" style="font-variation-settings:\'FILL\' 1;color:#E74C3C">radio_button_unchecked</span>'},
  stones:{x:'<span class="material-symbols-outlined" style="font-variation-settings:\'FILL\' 1;color:#1a1a1a;text-shadow:0 1px 2px rgba(0,0,0,.5)">circle</span>',o:'<span class="material-symbols-outlined" style="font-variation-settings:\'FILL\' 0;color:#f5f5f0;-webkit-text-stroke:2px #888">circle</span>'},
  animals:{x:'🐯',o:'🐼'},
  gems:{x:'💎',o:'🔷'}
};
function pieceMarkup(player){
  const style=PIECE_STYLES[settings.pieceStyle]||PIECE_STYLES.classic;
  return player==='X'?style.x:style.o;
}

const SIZE=settings.boardSize||15;
const boardEl=document.getElementById('board');
boardEl.style.gridTemplateColumns=`repeat(${SIZE},minmax(0,1fr))`;
const boardSection=document.getElementById('board-section');
const boardContainer=document.getElementById('game-board-container');

function fitBoard(){
  const w=boardSection.clientWidth-16;
  const h=boardSection.clientHeight-16;
  const size=Math.max(180,Math.min(w,h));
  boardContainer.style.width=size+'px';
  boardContainer.style.height=size+'px';
  const cellSize=(size-8)/SIZE;
  boardEl.style.setProperty('--cell-font',(cellSize*0.62)+'px');
  document.querySelectorAll('.piece').forEach(p=>{p.style.fontSize='var(--cell-font)';});
}
window.addEventListener('resize',fitBoard);

let board=[];
let cells=[];
let currentPlayer='X';
let history=[];
let gameOver=false;
let scoreX=0,scoreO=0;

function initBoard(){
  board=Array.from({length:SIZE},()=>Array(SIZE).fill(null));
  cells=[];
  boardEl.innerHTML='';
  for(let r=0;r<SIZE;r++){
    const row=[];
    for(let c=0;c<SIZE;c++){
      const cell=document.createElement('div');
      cell.className='board-cell';
      cell.dataset.row=r;cell.dataset.col=c;
      cell.addEventListener('click',()=>handleCellClick(r,c));
      boardEl.appendChild(cell);
      row.push(cell);
    }
    cells.push(row);
  }
  history=[];
  currentPlayer='X';
  gameOver=false;
  document.getElementById('move-list').innerHTML='';
  document.getElementById('move-count').textContent='Nước 0';
  updateTurnUI();
  fitBoard();
}

function updateTurnUI(){
  const playerX=document.getElementById('player-x');
  const playerO=document.getElementById('player-o');
  if(currentPlayer==='X'){
    playerX.classList.remove('opacity-40','grayscale');
    playerX.classList.add('border-b-2','border-action-green');
    playerO.classList.add('opacity-40','grayscale');
    playerO.classList.remove('border-b-2','border-action-red');
  }else{
    playerO.classList.remove('opacity-40','grayscale');
    playerO.classList.add('border-b-2','border-action-red');
    playerX.classList.add('opacity-40','grayscale');
    playerX.classList.remove('border-b-2','border-action-green');
  }
}

function placePiece(r,c,player,isLast=true){
  board[r][c]=player;
  const cell=cells[r][c];
  document.querySelectorAll('.last-move-indicator').forEach(el=>el.remove());
  const piece=document.createElement('div');
  piece.className='piece';
  piece.style.fontSize='var(--cell-font)';
  piece.innerHTML=pieceMarkup(player);
  cell.appendChild(piece);
  if(isLast){
    const indicator=document.createElement('div');
    indicator.className='last-move-indicator';
    cell.appendChild(indicator);
  }
  cell.classList.add('disabled');
}

function addHistoryEntry(r,c,player,index){
  const list=document.getElementById('move-list');
  list.querySelectorAll('.bg-secondary-container').forEach(el=>{
    el.classList.remove('bg-secondary-container','text-on-secondary-container','font-bold');
    el.classList.add('hover:bg-surface-variant');
  });
  const colLetter=String.fromCharCode(65+c);
  const item=document.createElement('div');
  item.className='flex items-center gap-3 p-2 bg-secondary-container text-on-secondary-container rounded-lg';
  item.innerHTML=`<span class="w-6 text-xs opacity-70">${index}.</span>
  <div class="flex-grow flex items-center gap-2 font-bold">
  <span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1">${player==='X'?'close':'radio_button_unchecked'}</span>
  <span>${colLetter}${r+1}</span></div>`;
  list.appendChild(item);
  list.scrollTop=list.scrollHeight;
  document.getElementById('move-count').textContent='Nước '+index;
}

function checkWin(r,c,player){
  const dirs=[[1,0],[0,1],[1,1],[1,-1]];
  for(const [dr,dc] of dirs){
    let cellsLine=[[r,c]];
    let rr=r+dr,cc=c+dc;
    while(rr>=0&&rr<SIZE&&cc>=0&&cc<SIZE&&board[rr][cc]===player){cellsLine.push([rr,cc]);rr+=dr;cc+=dc;}
    rr=r-dr;cc=c-dc;
    while(rr>=0&&rr<SIZE&&cc>=0&&cc<SIZE&&board[rr][cc]===player){cellsLine.push([rr,cc]);rr-=dr;cc-=dc;}
    if(cellsLine.length>=5) return cellsLine;
  }
  return null;
}

function isDraw(){
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(!board[r][c]) return false;
  return true;
}

function handleCellClick(r,c){
  if(gameOver||board[r][c]) return;
  if(mode==='ai'&&currentPlayer==='O') return;
  doMove(r,c,currentPlayer);
}

function doMove(r,c,player){
  placePiece(r,c,player,true);
  history.push({r,c,player});
  addHistoryEntry(r,c,player,history.length);
  const winLine=checkWin(r,c,player);
  if(winLine){endGame(player,winLine);return;}
  if(isDraw()){endGame(null,null);return;}
  currentPlayer=currentPlayer==='X'?'O':'X';
  updateTurnUI();
  if(mode==='ai'&&currentPlayer==='O'&&!gameOver){setTimeout(aiMove,350);}
}

function undoMove(){
  if(gameOver||history.length===0) return;
  const steps=(mode==='ai'&&history.length>=2)?2:1;
  for(let i=0;i<steps;i++){
    const last=history.pop();
    if(!last) break;
    board[last.r][last.c]=null;
    const cell=cells[last.r][last.c];
    cell.innerHTML='';
    cell.classList.remove('disabled');
    const list=document.getElementById('move-list');
    if(list.lastChild) list.removeChild(list.lastChild);
  }
  document.querySelectorAll('.last-move-indicator').forEach(el=>el.remove());
  if(history.length>0){
    const prev=history[history.length-1];
    const cell=cells[prev.r][prev.c];
    const indicator=document.createElement('div');
    indicator.className='last-move-indicator';
    cell.appendChild(indicator);
    currentPlayer=prev.player==='X'?'O':'X';
  }else{
    currentPlayer='X';
  }
  document.getElementById('move-count').textContent='Nước '+history.length;
  updateTurnUI();
}

function restartGame(){initBoard();}

function endGame(winner,winLine){
  gameOver=true;
  document.querySelectorAll('.board-cell').forEach(c=>c.classList.add('disabled'));
  if(winLine){
    winLine.forEach(([r,c])=>cells[r][c].classList.add('win-cell'));
    if(winner==='X') scoreX++; else scoreO++;
    document.getElementById('score-x').textContent=scoreX;
    document.getElementById('score-o').textContent=scoreO;
    showModal(winner);
  }else{
    showModal(null);
  }
}

function spawnConfetti(){
  const layer=document.getElementById('confetti-layer');
  layer.innerHTML='';
  const colors=['#81B64C','#9fd668','#E74C3C','#f5d76e','#5dade2'];
  for(let i=0;i<40;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(1+Math.random()*1.5)+'s';
    c.style.animationDelay=(Math.random()*0.4)+'s';
    layer.appendChild(c);
  }
}

function showModal(winner){
  const modal=document.getElementById('winner-modal');
  const icon=document.getElementById('modal-icon');
  const title=document.getElementById('modal-title');
  const desc=document.getElementById('modal-desc');
  if(winner){
    icon.textContent='emoji_events';
    icon.className='material-symbols-outlined text-6xl mb-md relative z-10 '+(winner==='X'?'text-action-green':'text-action-red');
    title.textContent='Chiến Thắng!';
    const name=winner==='X'?document.getElementById('name-x').textContent:document.getElementById('name-o').textContent;
    desc.textContent=name+' đã thắng với 5 quân liên tiếp.';
    spawnConfetti();
  }else{
    icon.textContent='handshake';
    icon.className='material-symbols-outlined text-6xl mb-md relative z-10 text-secondary';
    title.textContent='Hòa!';
    desc.textContent='Bàn cờ đã đầy, không ai chiến thắng.';
    document.getElementById('confetti-layer').innerHTML='';
  }
  modal.classList.remove('hidden');
  modal.classList.add('flex');
  setTimeout(()=>{document.getElementById('modal-card').classList.remove('scale-95');document.getElementById('modal-card').classList.add('scale-100');},50);
}

function closeModal(rematch){
  const modal=document.getElementById('winner-modal');
  document.getElementById('modal-card').classList.add('scale-95');
  setTimeout(()=>{
    modal.classList.add('hidden');
    modal.classList.remove('flex');
    if(rematch) restartGame();
  },300);
}

function evaluateLine(r,c,dr,dc,player){
  let count=1;let openEnds=0;
  let rr=r+dr,cc=c+dc;
  while(rr>=0&&rr<SIZE&&cc>=0&&cc<SIZE&&board[rr][cc]===player){count++;rr+=dr;cc+=dc;}
  if(rr>=0&&rr<SIZE&&cc>=0&&cc<SIZE&&!board[rr][cc]) openEnds++;
  rr=r-dr;cc=c-dc;
  while(rr>=0&&rr<SIZE&&cc>=0&&cc<SIZE&&board[rr][cc]===player){count++;rr-=dr;cc-=dc;}
  if(rr>=0&&rr<SIZE&&cc>=0&&cc<SIZE&&!board[rr][cc]) openEnds++;
  return {count,openEnds};
}

function scoreMove(r,c,player){
  let best=0;
  const dirs=[[1,0],[0,1],[1,1],[1,-1]];
  for(const [dr,dc] of dirs){
    const {count,openEnds}=evaluateLine(r,c,dr,dc,player);
    let s=count*count;
    if(openEnds===2) s*=2;
    if(count>=5) s+=100000;
    else if(count===4&&openEnds>0) s+=5000;
    else if(count===3&&openEnds===2) s+=1000;
    if(s>best) best=s;
  }
  return best;
}

function findWinningMove(player){
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c]) continue;
      board[r][c]=player;
      const win=checkWin(r,c,player);
      board[r][c]=null;
      if(win) return [r,c];
    }
  }
  return null;
}

function hasNeighbor(r,c,dist){
  for(let dr=-dist;dr<=dist;dr++){
    for(let dc=-dist;dc<=dist;dc++){
      if(dr===0&&dc===0) continue;
      const rr=r+dr,cc=c+dc;
      if(rr>=0&&rr<SIZE&&cc>=0&&cc<SIZE&&board[rr][cc]) return true;
    }
  }
  return false;
}

function getCandidates(limit){
  const seen=new Set();
  const list=[];
  let anyStone=false;
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c]){anyStone=true;continue;}
      if(!hasNeighbor(r,c,2)) continue;
      const key=r*1000+c;
      if(seen.has(key)) continue;
      seen.add(key);
      const s=scoreMove(r,c,'O')+scoreMove(r,c,'X')*0.92;
      list.push({r,c,s});
    }
  }
  if(!anyStone){
    const mid=Math.floor(SIZE/2);
    return [{r:mid,c:mid,s:0}];
  }
  list.sort((a,b)=>b.s-a.s);
  return list.slice(0,limit);
}

function patternScore(len,openEnds){
  if(len>=5) return 1000000;
  if(len===4) return openEnds===2?100000:10000;
  if(len===3) return openEnds===2?5000:500;
  if(len===2) return openEnds===2?200:50;
  if(len===1) return openEnds===2?10:5;
  return 0;
}

function lineScore(player){
  let total=0;
  const dirs=[[1,0],[0,1],[1,1],[1,-1]];
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c]!==player) continue;
      for(const [dr,dc] of dirs){
        const pr=r-dr,pc=c-dc;
        if(pr>=0&&pr<SIZE&&pc>=0&&pc<SIZE&&board[pr][pc]===player) continue;
        let len=0;let rr=r,cc=c;
        while(rr>=0&&rr<SIZE&&cc>=0&&cc<SIZE&&board[rr][cc]===player){len++;rr+=dr;cc+=dc;}
        let openEnds=0;
        if(pr>=0&&pr<SIZE&&pc>=0&&pc<SIZE&&!board[pr][pc]) openEnds++;
        if(rr>=0&&rr<SIZE&&cc>=0&&cc<SIZE&&!board[rr][cc]) openEnds++;
        total+=patternScore(len,openEnds);
      }
    }
  }
  return total;
}

function evaluateBoard(){return lineScore('O')-lineScore('X');}

function minimax(depth,isMax,alpha,beta,branch){
  if(depth===0) return evaluateBoard();
  const candidates=getCandidates(branch);
  if(candidates.length===0) return evaluateBoard();
  if(isMax){
    let best=-Infinity;
    for(const cand of candidates){
      board[cand.r][cand.c]='O';
      const win=checkWin(cand.r,cand.c,'O');
      let val;
      if(win) val=1000000+depth;
      else val=minimax(depth-1,false,alpha,beta,branch);
      board[cand.r][cand.c]=null;
      if(val>best) best=val;
      if(best>alpha) alpha=best;
      if(beta<=alpha) break;
    }
    return best;
  }else{
    let best=Infinity;
    for(const cand of candidates){
      board[cand.r][cand.c]='X';
      const win=checkWin(cand.r,cand.c,'X');
      let val;
      if(win) val=-1000000-depth;
      else val=minimax(depth-1,true,alpha,beta,branch);
      board[cand.r][cand.c]=null;
      if(val<best) best=val;
      if(best<beta) beta=best;
      if(beta<=alpha) break;
    }
    return best;
  }
}

const DIFFICULTY_CONFIG={
  easy:{depth:0,branch:6},
  normal:{depth:1,branch:10},
  hard:{depth:2,branch:8},
  master:{depth:3,branch:6}
};

function aiMove(){
  if(gameOver) return;
  let move=findWinningMove('O');
  if(!move) move=findWinningMove('X');
  if(!move){
    const cfg=DIFFICULTY_CONFIG[settings.aiDifficulty]||DIFFICULTY_CONFIG.easy;
    if(cfg.depth===0){
      const candidates=getCandidates(Math.max(cfg.branch,4));
      const topScore=candidates[0].s;
      const topMoves=candidates.filter(c=>c.s>=topScore*0.8);
      const pick=topMoves[Math.floor(Math.random()*topMoves.length)];
      move=[pick.r,pick.c];
    }else{
      const candidates=getCandidates(Math.max(cfg.branch+6,12));
      let bestScore=-Infinity;let bestMoves=[];
      for(const cand of candidates){
        board[cand.r][cand.c]='O';
        const win=checkWin(cand.r,cand.c,'O');
        let val;
        if(win) val=1000000;
        else val=minimax(cfg.depth-1,false,-Infinity,Infinity,cfg.branch);
        board[cand.r][cand.c]=null;
        if(val>bestScore){bestScore=val;bestMoves=[cand];}
        else if(val===bestScore){bestMoves.push(cand);}
      }
      const pick=bestMoves[Math.floor(Math.random()*bestMoves.length)]||candidates[0];
      move=[pick.r,pick.c];
    }
  }
  if(move) doMove(move[0],move[1],'O');
}

initBoard();
